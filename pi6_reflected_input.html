<!DOCTYPE html>
<html>
<head>
<title>PI6 Reflected Input Injection</title>
</head>

<body>

<h1>Search Page</h1>

<p>Your search query:</p>

<p id="query"></p>

<script>
const params = new URLSearchParams(window.location.search);
const q = params.get("q");
document.getElementById("query").innerText = q;
</script>

<p>This page reflects user input.</p>

</body>
</html>
