<!DOCTYPE html>
<html>
<head>
  <title>PI6 Reflected Input Injection</title>
</head>

<body>

  <h1>Search Page</h1>

  <form method="GET">
    <label for="q">Search:</label>
    <input type="text" id="q" name="q" placeholder="Enter search query">
    <button type="submit">Search</button>
  </form>

  <p>Your search query:</p>
  <p id="query"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    const q = params.get("q");

    if (q) {
      document.getElementById("query").innerText = q;
    }
  </script>

  <p>This page reflects user input.</p>

</body>
</html>
